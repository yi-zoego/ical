name: Fetch Calendar Data

on:
  schedule:
    - cron: '0 */2 * * *'  # 每 2 小時執行一次（UTC時間，台灣+8）
  workflow_dispatch:               # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Calendar
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CALENDAR_ID: 08f9a5f59b69b2ee7c77e95ab85bfc493cd104099f506884f840fae7dabebbca@group.calendar.google.com
        run: python fetch_calendar.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update calendar data"
          git push
