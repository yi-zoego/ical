<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心怡的課表</title>
<link rel="icon" href="./logo2.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --navy-mid: #243258;
    --navy-light: #2e4070;
    --gold: #b8976a;
    --gold-light: #d4b48a;
    --cream: #f5f0e8;
    --cream-dark: #ede6d8;
    --text-dark: #1a2744;
    --text-mid: #3d4f6e;
    --text-light: #7a8ba8;
    --white: #ffffff;
    --shadow: 0 2px 16px rgba(26,39,68,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--navy);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(26,39,68,0.18);
    flex-shrink: 0;
  }
  .logo-circle {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--cream); border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif TC', serif; font-weight: 700;
    font-size: 18px; color: var(--navy); flex-shrink: 0;
  }
  .logo { width: 35px; }
  .header-text h1 {
    font-family: 'Noto Serif TC', serif; font-size: 17px;
    font-weight: 700; color: var(--white); letter-spacing: 2px;
  }
  .header-text p { font-size: 11px; color: var(--gold-light); letter-spacing: 1px; margin-top: 1px; }
  .main { display: flex; flex: 1; gap: 0; overflow: hidden; height: calc(100vh - 64px); }
  .calendar-panel { flex: 1; padding: 20px; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .calendar-panel iframe {
    width: 100%; height: 640px; flex-shrink: 0;
    border: none; border-radius: var(--radius); box-shadow: var(--shadow); background: white;
  }
  .side-panel {
    width: 33%; min-width: 260px; max-width: 380px;
    background: var(--navy); display: flex; flex-direction: column; overflow: hidden;
  }
  .side-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--navy-light); flex-shrink: 0; }
  .side-header h2 {
    font-family: 'Noto Serif TC', serif; font-size: 13px;
    color: var(--gold); letter-spacing: 2px; font-weight: 600;
  }
  .side-header-row { display: flex; align-items: center; justify-content: space-between; }
  .update-time { font-size: 10px; color: var(--text-light); margin-top: 3px; }
  .refresh-btn {
    background: none; border: 1px solid var(--navy-light); border-radius: 4px;
    color: var(--text-light); font-size: 10px; padding: 3px 8px; cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .side-content { flex: 1; overflow-y: auto; padding: 12px 0 8px; }
  .side-content::-webkit-scrollbar { width: 4px; }
  .side-content::-webkit-scrollbar-track { background: transparent; }
  .side-content::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius: 2px; }
  .group-block { margin-bottom: 4px; }
  .group-title {
    padding: 6px 20px 4px; font-size: 10px; letter-spacing: 2px;
    color: var(--gold); font-weight: 500; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .group-title::after { content: ''; flex: 1; height: 1px; background: var(--navy-light); }
  .company-row { padding: 5px 20px 5px 24px; display: flex; align-items: baseline; gap: 8px; }
  .company-name { font-size: 13px; color: var(--cream); font-weight: 500; white-space: nowrap; min-width: 120px; flex-shrink: 0; }
  .company-dates { font-size: 13px; color: var(--text-light); line-height: 1.6; word-break: break-all; }
  .company-dates .future-date { color: var(--gold-light); }
  .company-dates .past-date { color: #5a6a88; }
  .seg-tag { font-size: 9px; opacity: 0.75; margin-left: 1px; }
  .status-msg { padding: 20px; font-size: 12px; color: var(--text-light); text-align: center; }
  .memo-section { border-top: 1px solid var(--navy-light); padding: 12px 20px 16px; flex-shrink: 0; }
  .memo-title { font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 8px; }
  .memo-list { list-style: none; }
  .memo-list li {
    font-size: 11px; color: #7a8ba8; padding: 2px 0;
    display: flex; align-items: flex-start; gap: 6px; line-height: 1.5;
  }
  .memo-list li::before { content: '•'; color: var(--navy-light); flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="logo-circle"><img src="./logo.svg" alt="" class="logo"></div>
  <div class="header-text">
    <h1>心怡的課表</h1>
    <p>呂心怡 ｜ zoego99@gmail.com｜ zoelu899@gmail.com</p>
  </div>
</header>

<div class="main">
  <div class="calendar-panel">
    <iframe
      src="https://calendar.google.com/calendar/embed?src=08f9a5f59b69b2ee7c77e95ab85bfc493cd104099f506884f840fae7dabebbca%40group.calendar.google.com&ctz=Asia%2FTaipei&hl=zh-TW"
      frameborder="0" scrolling="no" allowfullscreen>
    </iframe>
  </div>

  <div class="side-panel">
    <div class="side-header">
      <div class="side-header-row">
        <h2>課程彙整</h2>
        <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">🔄 立即更新</button>
      </div>
      <div class="update-time" id="updateTime">讀取中…</div>
    </div>
    <div class="side-content" id="courseList">
      <div class="status-msg">載入課表資料中…</div>
    </div>
    <div class="memo-section">
      <div class="memo-title">固定行程備忘</div>
      <ul class="memo-list" id="memoList"></ul>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
// ── Helpers ──
function today() {
  const d = new Date(); d.setHours(0,0,0,0); return d;
}
function formatDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function parseTitle(title) {
  const inner = title.replace(/^【/, '').replace(/】$/, '');
  const parts = inner.split('_');
  if (parts.length < 2) return null;
  const segment = parts[0].trim();
  const company = parts[1].trim();
  const handler = parts[2] ? parts[2].trim() : '';
  if (inner.includes('1對1')) return null;
  if (IGNORE_COMPANIES.includes(company)) return null;
  return { segment, company, handler };
}
function matchGroup(handler) {
  for (const g of GROUPS) { if (handler.includes(g)) return g; }
  return null;
}
function isPhone(company) { return company.startsWith('手機'); }

// ── Load from data.json ──
async function loadCourses() {
  const listEl = document.getElementById('courseList');
  const timeEl = document.getElementById('updateTime');
  try {
    const res = await fetch(`./data.json?_t=${Date.now()}`);
    if (!res.ok) throw new Error('data.json 尚未產生，請稍候');
    const json = await res.json();

    const now = today();
    const parsed = [];
    for (const item of json.events || []) {
      const date = new Date(item.date.replace(/-/g, '/'));
      if (isNaN(date)) continue;
      const p = parseTitle(item.title);
      if (!p) continue;
      parsed.push({ ...p, date });
    }

    const companyMap = {};
    for (const item of parsed) {
      const key = item.company;
      if (!companyMap[key]) {
        let groupKey = isPhone(item.company) ? '__phone__' : (matchGroup(item.handler) || '__other__');
        companyMap[key] = { company: item.company, groupKey, entries: [] };
      }
      companyMap[key].entries.push({ date: item.date, segment: item.segment });
    }

    const active = Object.values(companyMap).filter(c => c.entries.some(e => e.date >= now));
    active.forEach(c => c.entries.sort((a,b) => a.date - b.date));
    active.sort((a,b) => a.entries[0].date - b.entries[0].date);

    const groupOrder = [...GROUPS, '__phone__', '__other__'];
    const grouped = {};
    groupOrder.forEach(k => grouped[k] = []);
    for (const c of active) { if (grouped[c.groupKey] !== undefined) grouped[c.groupKey].push(c); }

    const segLabel = { '上': '上', '下': '下', '整': '整天', '整天': '整天', '晚': '晚' };
    let html = '';
    for (const gk of groupOrder) {
      const companies = grouped[gk];
      if (!companies.length) continue;
      let label = gk === '__phone__' ? '手機' : gk === '__other__' ? '其他' : (GROUP_LABELS[gk] || gk);
      html += `<div class="group-block"><div class="group-title">${label}</div>`;
      for (const c of companies) {
        const dateSpans = c.entries.map(e => {
          const cls = e.date >= now ? 'future-date' : 'past-date';
          const seg = segLabel[e.segment] || e.segment;
          return `<span class="${cls}">${formatDate(e.date)}<span class="seg-tag">(${seg})</span></span>`;
        }).join('<span style="color:#3a4a66"> · </span>');
        html += `<div class="company-row"><span class="company-name">${c.company}</span><span class="company-dates">${dateSpans}</span></div>`;
      }
      html += `</div>`;
    }

    if (!html) html = '<div class="status-msg">目前無進行中課程</div>';
    listEl.innerHTML = html;

    // 顯示資料產生時間
    const dataTime = new Date(json.updated);
    const th = dataTime.getHours() + 8; // UTC→台灣
    const localH = th >= 24 ? th - 24 : th;
    timeEl.textContent = `資料更新：${dataTime.getMonth()+1}/${dataTime.getDate()} ${String(localH).padStart(2,'0')}:${String(dataTime.getMinutes()).padStart(2,'0')}`;

  } catch(e) {
    listEl.innerHTML = `<div class="status-msg">⚠ ${e.message}</div>`;
    timeEl.textContent = '載入失敗';
  }
}

// ── 手動立即更新：整頁重新整理 ──
function manualRefresh() {
  location.reload(true);
}

// ── Render Memo ──
function renderMemo() {
  const el = document.getElementById('memoList');
  if (!MEMO || !MEMO.length) { el.parentElement.style.display = 'none'; return; }
  el.innerHTML = MEMO.map(m => `<li>${m}</li>`).join('');
}

renderMemo();
loadCourses();
</script>
</body>
</html>
